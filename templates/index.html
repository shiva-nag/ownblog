<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog Article Generator</title>
    <script>
        function streamResponse(url, formData, outputElement) {
            fetch(url, {
                method: 'POST',
                body: formData
            }).then(response => {
                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                function read() {
                    reader.read().then(({done, value}) => {
                        if (done) return;
                        const chunk = decoder.decode(value);
                        const lines = chunk.split('\n');
                        lines.forEach(line => {
                            if (line.startsWith('data: ')) {
                                const data = line.slice(6);
                                if (data === '[DONE]') {
                                    return;
                                }
                                outputElement.innerHTML += data;
                            }
                        });
                        read();
                    });
                }
                read();
            });
        }

        function generateIdeas() {
            const topic = document.getElementById('ideaTopic').value;
            const output = document.getElementById('ideasResult');
            output.innerHTML = '';
            const formData = new FormData();
            formData.append('topic', topic);
            streamResponse('/generate_ideas', formData, output);
        }

        function generateArticle() {
            const topic = document.getElementById('articleTopic').value;
            const output = document.getElementById('articleResult');
            output.innerHTML = '';
            const formData = new FormData();
            formData.append('topic', topic);
            streamResponse('/generate_article', formData, output);
        }

        function rewriteText() {
            const text = document.getElementById('text_to_rewrite').value;
            const mode = document.getElementById('mode').value;
            const output = document.getElementById('rewrittenText');
            output.innerHTML = '';
            const formData = new FormData();
            formData.append('text_to_rewrite', text);
            formData.append('mode', mode);
            streamResponse('/rewrite_text', formData, output);
        }
    </script>
</head>
<body>
    <h1>Blog Article Generator</h1>

    <h2>Generate Ideas</h2>
    <input type="text" id="ideaTopic" placeholder="Enter a topic">
    <button onclick="generateIdeas()">Generate Ideas</button>
    <div id="ideasResult"></div>

    <h2>Generate Article</h2>
    <input type="text" id="articleTopic" placeholder="Enter a topic">
    <button onclick="generateArticle()">Generate Article</button>
    <div id="articleResult"></div>

    <h2>Rewrite Text</h2>
    <textarea id="text_to_rewrite" placeholder="Enter text to rewrite"></textarea>
    <select id="mode">
        <option value="standard">Standard</option>
        <option value="creative">Creative</option>
        <option value="formal">Formal</option>
        <option value="casual">Casual</option>
    </select>
    <button onclick="rewriteText()">Rewrite Text</button>
    <div id="rewrittenText"></div>
</body>
</html>
